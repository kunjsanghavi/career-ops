                  - heading "Job Description" [level=4] [ref=e102]
                  - text: To manage a lead our indirect tax practice in Mumbai, primarily working on Customs & international Trade opportunities but also having working knowledge of GST and other domestic indirect taxes. Eligible candidates should demonstrate team leadership skills, client handling skills and ability to independently conclude on topical issues pertaining to indirect taxes. They should also have a body of clients and contacts to whom the Firm can pitch for indirect tax services.
                  - heading "Qualification and Experience" [level=4] [ref=e103]
                  - list [ref=e104]:
                    - listitem [ref=e105]: Qualified CA/ CMA/ Lawyer
                    - listitem [ref=e106]: Minimum 7-8 years of post-qualification experience in indirect tax advisory/ consulting
                  - heading "Skills Description" [level=4] [ref=e107]
                  - text: (A) Technical knowledge
                  - paragraph [ref=e108]: Customs & International Trade
                  - list [ref=e109]:
                    - listitem [ref=e110]: Proven expertise in Customs, International Trade, Foreign Trade Policy and related regulations
                    - listitem [ref=e111]: Independently arrive at conclusions on topical matters relating to Customs and International Trade law
                    - listitem [ref=e112]: Legal/ procedural research using available tools and archives, including from Public Domain
                    - listitem [ref=e113]: Drafting appeals, department interactions
                    - listitem [ref=e114]: Hands-on expertise in Customs procedures (including Valuation, Classification, etc)
                    - listitem [ref=e115]: Working knowledge of STPI/ SEZ compliance procedures
                  - text: Goods & Services Tax
                  - list [ref=e116]:
                    - listitem [ref=e117]: Proven expertise in Goods & Services Tax laws (GST laws) and related regulations
                    - listitem [ref=e118]: Independently arrive at conclusions on topical matters relating to GST laws
                    - listitem [ref=e119]: Hands-on expertise in GST compliances, including managing and delivering on GST reconciliations
                  - text: (B) General skills
                  - list [ref=e120]:
                    - listitem [ref=e121]: Excellent written and verbal communication skills, including but not limited to drafting advices, appeals, emails and other correspondence with clients
                    - listitem [ref=e122]: Good presentation skills in communicating a point of view to clients and team members
                    - listitem [ref=e123]: Ability to manage and motivate a team of indirect tax professionals to work together in delivering quality services to clients
                    - listitem [ref=e124]: Proven ability to engage with Revenue authorities (Customs, FTP, GST, etc)
                    - listitem [ref=e125]: Able and willing to lead client interactions and independently handle new client conversations
                    - listitem [ref=e126]: Good at basic arithmetic
                  - text: (C) Technology skills
                  - list [ref=e127]:
                    - listitem [ref=e128]: Able to comfortably use Windows programs Word, Excel, PowerPoint
                    - listitem [ref=e129]: Able to use Firms GST technology tools for compliances
                    - listitem [ref=e130]: Working knowledge of at least one ERP platform – SAP, Oracle, Microsoft, etc.
                  - text: "Location: Andheri East - Chakala (Mumbai)"
                  - paragraph [ref=e131]: Kindly share you updated CV on pooja.vora@bhutashah.com or connect on What's app - 9819194106
                  - paragraph [ref=e132]: Regards,
                  - heading "Pooja Vora" [level=4] [ref=e133]

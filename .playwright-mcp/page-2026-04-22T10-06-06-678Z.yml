            - generic [ref=e80]:
              - paragraph [ref=e84]: "We are seeking an experienced Senior Manager/Director - Indirect Tax (GST) to lead and manage the organisation's indirect tax function. The role will be responsible for GST compliance, litigation management, tax advisory, and process optimization while ensuring adherence to regulatory requirements. Key Responsibilities: 1. GST Compliance & Filings: - Oversee preparation and filing of GST returns (GSTR-1, GSTR-3B, GSTR-9, GSTR-9C). - Ensure accurate GST reconciliation including GSTR-2B vs purchase register and sales reconciliation. - Monitor input tax credit (ITC) eligibility and ensure optimal utilisation. - Ensure compliance with E-invoicing and E-way bill regulations. 2. GST Assessments, Notices & Litigation: - Handle GST notices, audits, assessments, and departmental queries. - Draft responses and represent the company before GST authorities and consultants where required. - Manage litigation matters and coordinate with external tax advisors and legal counsels. 3. Tax Advisory & Business Support: - Provide GST advisory support to internal stakeholders across finance, procurement, projects, and commercial teams. - Evaluate tax implications on contracts, vendor arrangements, and business transactions. - Guide business teams on structuring transactions for tax efficiency and compliance. 4. Process Controls & Compliance Management: - Establish and strengthen internal controls for GST compliance and reporting. - Ensure periodic reconciliations and compliance reviews. - Support internal and statutory audits related to indirect tax matters. 5. Regulatory Updates: - Track changes in GST laws, notifications, and circulars and evaluate their impact on the organisation. - Implement necessary process changes to ensure compliance with evolving regulations. 6. Team Leadership: - Lead and mentor the indirect tax team and coordinate with finance and accounting teams across locations. Qualification: - CA / Lawyer with specialization in Taxation. - Strong knowledge of GST law, rules, and compliance procedures. Skills & Competencies: - Strong understanding of GST compliance and litigation. - Experience in handling GST assessments and notices. - Ability to work closely with business teams and external consultants. - Strong analytical, communication, and stakeholder management skills. - Proficiency in ERP systems and GST compliance tools. Preferred Experience: - Experience in EPC, infrastructure, manufacturing, or renewable energy sector will be an advantage. - Exposure to multi-state GST compliance."

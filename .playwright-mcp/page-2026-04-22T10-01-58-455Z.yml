            - generic [ref=e80]:
              - paragraph [ref=e84]:
                - text: We are seeking an experienced Senior Manager/Director - Indirect Tax (GST) to lead and manage the organisation's indirect tax function. The role will be responsible for GST compliance, litigation management, tax advisory, and process optimization while ensuring adherence to regulatory requirements.
                - text: "Key Responsibilities:"
                - text: "1. GST Compliance & Filings:"
                - text: "- Oversee preparation and filing of GST returns (GSTR-1, GSTR-3B, GSTR-9, GSTR-9C)."
                - text: "- Ensure accurate GST reconciliation including GSTR-2B vs purchase register and sales reconciliation."
                - text: "- Monitor input tax credit (ITC) eligibility and ensure optimal utilisation."
                - text: "- Ensure compliance with E-invoicing and E-way bill regulations."
                - text: "2. GST Assessments, Notices & Litigation:"
                - text: "- Handle GST notices, audits, assessments, and departmental queries."
                - text: "- Draft responses and represent the company before GST authorities and consultants where required."
                - text: "- Manage litigation matters and coordinate with external tax advisors and legal counsels."
                - text: "3. Tax Advisory & Business Support:"
                - text: "- Provide GST advisory support to internal stakeholders across finance, procurement, projects, and commercial teams."
                - text: "- Evaluate tax implications on contracts, vendor arrangements, and business transactions."
                - text: "- Guide business teams on structuring transactions for tax efficiency and compliance."
                - text: "4. Process Controls & Compliance Management:"
                - text: "- Establish and strengthen internal controls for GST compliance and reporting."
                - text: "- Ensure periodic reconciliations and compliance reviews."
                - text: "- Support internal and statutory audits related to indirect tax matters."
                - text: "5. Regulatory Updates:"
                - text: "- Track changes in GST laws, notifications, and circulars and evaluate their impact on the organisation."
                - text: "- Implement necessary process changes to ensure compliance with evolving regulations."
                - text: "6. Team Leadership:"
                - text: "- Lead and mentor the indirect tax team and coordinate with finance and accounting teams across locations."
                - text: "Qualification:"
                - text: "- CA / Lawyer with specialization in Taxation."
                - text: "- Strong knowledge of GST law, rules, and compliance procedures."
                - text: "Skills & Competencies:"
                - text: "- Strong understanding of GST compliance and litigation."
                - text: "- Experience in handling GST assessments and notices."
                - text: "- Ability to work closely with business teams and external consultants."
                - text: "- Strong analytical, communication, and stakeholder management skills."
                - text: "- Proficiency in ERP systems and GST compliance tools."
                - text: "Preferred Experience:"
                - text: "- Experience in EPC, infrastructure, manufacturing, or renewable energy sector will be an advantage."
                - text: "- Exposure to multi-state GST compliance."
